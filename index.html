<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#322d26" />
  <title>世界の偉人 格言アーカイブ</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="stylesheet" href="style.css?v=8" />
</head>
<body>
  <header class="app-header">
    <h1>世界の偉人 格言アーカイブ</h1>
    <p class="subtitle">毎朝ひとつ、心に火をつける言葉を。</p>
  </header>

  <main>
    <!-- 今日の格言 -->
    <section id="today-section" class="today-section">
      <div class="today-label">✦ 今日の格言</div>
      <div id="today-card" class="today-card">読み込み中…</div>
    </section>

    <!-- タブ -->
    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="all">すべて</button>
      <button class="tab" data-tab="authors">人物別</button>
      <button class="tab" data-tab="favorites">お気に入り</button>
    </nav>

    <!-- 検索 -->
    <div class="search-wrap" id="search-wrap">
      <input type="search" id="search-input" placeholder="格言・人物名・キーワードで検索…" autocomplete="off" />
    </div>

    <!-- タグ絞り込み -->
    <div id="tag-bar" class="tag-bar"></div>
    <span id="result-count" class="result-count"></span>

    <!-- 一覧 -->
    <section id="list" class="list"></section>
  </main>

  <div id="updated-at" class="updated-at"></div>

  <!-- トップへ戻る -->
  <button id="to-top" class="to-top" aria-label="トップへ戻る">↑</button>

  <!-- 詳細モーダル -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close" aria-label="閉じる">×</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="app.js?v=8"></script>
</body>
</html>
